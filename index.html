<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Becca Barkhouse — Media Kit</title>
<style>
  :root {
    --bg: #0f0f14;
    --card: #17171f;
    --card-border: #262633;
    --accent: #ff5c8a;
    --accent2: #7c5cff;
    --text: #f4f4f8;
    --muted: #9a9aab;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at 20% 0%, #23122b 0%, var(--bg) 55%);
    color: var(--text);
    min-height: 100vh;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 48px 24px 80px; }

  header.hero {
    text-align: center;
    margin-bottom: 40px;
  }
  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 700;
  }
  h1 { font-size: 32px; margin: 0 0 6px; }
  .tagline { color: var(--muted); font-size: 16px; margin: 0; }
  .updated {
    display: inline-block;
    margin-top: 16px;
    font-size: 12px;
    color: var(--muted);
    padding: 6px 12px;
    border: 1px solid var(--card-border);
    border-radius: 999px;
  }
  .updated.live::before {
    content: "";
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #38e07a;
    margin-right: 6px;
    box-shadow: 0 0 0 0 rgba(56,224,122,.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(56,224,122,.5); }
    70% { box-shadow: 0 0 0 6px rgba(56,224,122,0); }
    100% { box-shadow: 0 0 0 0 rgba(56,224,122,0); }
  }

  .platforms {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }
  .platform-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 24px;
  }
  .platform-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .platform-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700;
  }
  .platform-icon.instagram { background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af, #515bd4); }
  .platform-icon.tiktok { background: #010101; color: #fff; }
  .platform-name { font-weight: 600; font-size: 15px; }
  .platform-handle { color: var(--muted); font-size: 13px; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .stat { text-align: center; padding: 10px 4px; }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
  .pending { color: var(--muted); font-size: 12px; margin-top: 14px; }

  .placeholder-card {
    background: var(--card);
    border: 1px dashed var(--card-border);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    min-height: 140px;
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 40px;
  }
  .refresh-btn {
    display: block;
    margin: 24px auto 0;
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
  }
  .refresh-btn:hover { border-color: var(--accent2); }
  .error-banner {
    background: #3a1c22;
    border: 1px solid #6b2a35;
    color: #ffb4c0;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="avatar">BB</div>
      <h1>Becca Barkhouse</h1>
      <p class="tagline">Content Creator · Media Kit</p>
      <span class="updated live" id="updated">Loading live stats…</span>
    </header>

    <div id="error-slot"></div>

    <section class="platforms" id="platform-slot">
      <div class="placeholder-card">Pulling live numbers…</div>
    </section>

    <button class="refresh-btn" id="refresh">Refresh stats</button>

    <footer>
      Stats pulled live via the Phyllo API · For collaborations, contact rebeccabarkhouse7@gmail.com
    </footer>
  </div>

<script>
  const PLATFORM_META = {
    instagram: { label: "Instagram", icon: "IG", iconClass: "instagram", handlePrefix: "@" },
    tiktok: { label: "TikTok", icon: "TT", iconClass: "tiktok", handlePrefix: "@" },
  };

  function fmt(n) {
    if (n === null || n === undefined) return "—";
    if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
    if (n >= 1000) return (n / 1000).toFixed(1) + "K";
    return String(n);
  }

  function renderCard(stat) {
    const meta = PLATFORM_META[stat.platform] || { label: stat.platform, icon: "?", iconClass: "" };
    if (stat.error) {
      return `<div class="platform-card">
        <div class="platform-head">
          <div class="platform-icon ${meta.iconClass}">${meta.icon}</div>
          <div><div class="platform-name">${meta.label}</div><div class="platform-handle">Unavailable</div></div>
        </div>
        <div class="pending">Couldn't load this platform's stats right now.</div>
      </div>`;
    }
    const handle = stat.username ? meta.handlePrefix + stat.username : "";
    const hasLikes = stat.avg_likes !== null && stat.avg_likes !== undefined;
    return `<div class="platform-card">
      <div class="platform-head">
        <div class="platform-icon ${meta.iconClass}">${meta.icon}</div>
        <div><div class="platform-name">${meta.label}</div><div class="platform-handle">${handle}</div></div>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="num">${fmt(stat.followers)}</div><div class="label">Followers</div></div>
        <div class="stat"><div class="num">${fmt(stat.posts)}</div><div class="label">Posts</div></div>
        <div class="stat"><div class="num">${fmt(stat.following)}</div><div class="label">Following</div></div>
      </div>
      ${hasLikes ? `<div class="pending">❤ ${fmt(stat.avg_likes)} total likes</div>` : '<div class="pending">Engagement metrics still syncing from Phyllo.</div>'}
    </div>`;
  }

  async function loadStats() {
    const updatedEl = document.getElementById("updated");
    const slot = document.getElementById("platform-slot");
    const errSlot = document.getElementById("error-slot");
    updatedEl.textContent = "Refreshing…";
    errSlot.innerHTML = "";
    try {
      const res = await fetch("/api/stats", { cache: "no-store" });
      if (!res.ok) throw new Error("Request failed: " + res.status);
      const data = await res.json();
      const stats = data.stats || [];
      slot.innerHTML = stats.map(renderCard).join("") ||
        '<div class="placeholder-card">No connected accounts yet.</div>';
      const time = new Date(data.updated_at || Date.now());
      updatedEl.classList.add("live");
      updatedEl.textContent = "Live · updated " + time.toLocaleString();
    } catch (err) {
      errSlot.innerHTML = '<div class="error-banner">Could not reach the stats service. Showing last known state.</div>';
      updatedEl.textContent = "Live stats unavailable";
      updatedEl.classList.remove("live");
    }
  }

  document.getElementById("refresh").addEventListener("click", loadStats);
  loadStats();
</script>
</body>
</html>
